<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Horizon Lab - 职位抓取工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-blue-50">
    <!-- Header -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-yellow-500 to-yellow-600 rounded-lg flex items-center justify-center shadow-lg">
                        <span class="text-white font-bold text-xl">E</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Event Horizon Lab</h1>
                        <p class="text-xs text-gray-500">职位抓取工具</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/tutorial" class="text-gray-600 hover:text-gray-900 text-sm">
                        📖 使用教程
                    </a>
                    <a href="/" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">
                        🏠 首页
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <!-- Step 1: Input URL -->
        <div class="bg-white rounded-2xl shadow-lg p-8 mb-8">
            <div class="flex items-center mb-6">
                <span class="bg-blue-100 text-blue-800 text-lg font-bold px-4 py-2 rounded-full mr-4">
                    📌 步骤1
                </span>
                <h2 class="text-2xl font-bold text-gray-900">输入职位链接</h2>
            </div>

            <div class="space-y-4">
                <div>
                    <label for="jobUrl" class="block text-sm font-medium text-gray-700 mb-2">
                        职位网址 (URL)
                    </label>
                    <input
                        type="url"
                        id="jobUrl"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="https://www.mckinsey.com/careers/associate-2026"
                        required
                    >
                    <p class="mt-2 text-sm text-gray-500">
                        💡 粘贴完整的职位链接（支持LinkedIn、公司官网、第三方招聘平台）
                    </p>
                </div>

                <button
                    id="scrapeBtn"
                    onclick="scrapeJob()"
                    class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white font-semibold py-3 px-6 rounded-lg hover:from-blue-700 hover:to-blue-800 transform hover:scale-[1.02] transition-all duration-200 shadow-lg"
                >
                    🔍 开始抓取
                </button>
            </div>
        </div>

        <!-- Loading State (Hidden by default) -->
        <div id="loadingState" class="hidden bg-white rounded-2xl shadow-lg p-8 mb-8">
            <div class="text-center">
                <div class="inline-block animate-spin rounded-full h-16 w-16 border-4 border-blue-600 border-t-transparent mb-4"></div>
                <h3 class="text-xl font-semibold text-gray-900 mb-2">正在抓取...</h3>
                <p class="text-gray-600" id="loadingMessage">正在访问网页</p>
            </div>
        </div>

        <!-- Step 2: Review & Confirm (Hidden by default) -->
        <div id="resultState" class="hidden bg-white rounded-2xl shadow-lg p-8">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center">
                    <span class="bg-green-100 text-green-800 text-lg font-bold px-4 py-2 rounded-full mr-4">
                        ✅ 抓取成功
                    </span>
                    <h2 class="text-2xl font-bold text-gray-900">请确认信息</h2>
                </div>
                <div class="text-right">
                    <p class="text-sm text-gray-500">AI信心评分</p>
                    <p class="text-2xl font-bold text-blue-600" id="confidenceScore">98%</p>
                </div>
            </div>

            <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6">
                <p class="text-yellow-800 text-sm">
                    ⚠️ <strong>重点检查</strong>：签证赞助、截止日期、工作地点。发现错误可直接点击修改
                </p>
            </div>

            <!-- Job Details Form -->
            <form id="jobForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Company -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            公司名称 <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="company" class="job-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                    </div>

                    <!-- Title -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            职位名称 <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="title" class="job-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                    </div>

                    <!-- Industry -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            行业分类 <span class="text-red-500">*</span>
                        </label>
                        <select id="industry" class="job-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                            <option value="咨询">咨询</option>
                            <option value="投行">投行</option>
                            <option value="科技互联网">科技互联网</option>
                            <option value="金融科技">金融科技</option>
                            <option value="快消">快消</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>

                    <!-- Location -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            工作地点 <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="location" class="job-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                    </div>

                    <!-- Type -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            职位类型 <span class="text-red-500">*</span>
                        </label>
                        <select id="type" class="job-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                            <option value="Full-time">Full-time</option>
                            <option value="Internship">Internship</option>
                            <option value="Part-time">Part-time</option>
                            <option value="Contract">Contract</option>
                        </select>
                    </div>

                    <!-- Degree -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            学历要求 <span class="text-red-500">*</span>
                        </label>
                        <select id="degree" class="job-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                            <option value="Any">Any</option>
                            <option value="Bachelor">Bachelor</option>
                            <option value="Master">Master</option>
                            <option value="MBA">MBA</option>
                            <option value="PhD">PhD</option>
                            <option value="Preferred">Preferred</option>
                        </select>
                    </div>

                    <!-- Visa Sponsorship -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            签证赞助 ⚠️ <span class="text-red-500">*</span>
                        </label>
                        <select id="visa_sponsorship" class="job-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 font-semibold" required>
                            <option value="Yes" class="text-green-600">✅ Yes - 提供签证</option>
                            <option value="No" class="text-red-600">❌ No - 不提供签证</option>
                            <option value="Case by case" class="text-yellow-600">🤔 Case by case - 视情况而定</option>
                            <option value="Not mentioned" class="text-gray-600">❓ Not mentioned - 未提及</option>
                        </select>
                    </div>

                    <!-- Deadline -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            截止日期 ⚠️ <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="deadline" class="job-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="YYYY-MM-DD 或 ASAP/Rolling" required>
                    </div>

                    <!-- Target Year -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            目标年级
                        </label>
                        <select id="target_year" class="job-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="Any">Any</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                        </select>
                    </div>

                    <!-- Salary -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            薪资范围
                        </label>
                        <input type="text" id="salary" class="job-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="例如：£80,000 - £95,000">
                    </div>

                    <!-- Apply Link -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            申请链接 <span class="text-red-500">*</span>
                        </label>
                        <input type="url" id="apply_link" class="job-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                    </div>

                    <!-- Description -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            职位描述
                        </label>
                        <textarea id="description" rows="3" class="job-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row gap-4 mt-6 pt-6 border-t">
                    <button
                        type="button"
                        onclick="saveJob()"
                        class="flex-1 bg-gradient-to-r from-green-600 to-green-700 text-white font-semibold py-3 px-6 rounded-lg hover:from-green-700 hover:to-green-800 transform hover:scale-[1.02] transition-all duration-200 shadow-lg"
                    >
                        ✅ 确认写入
                    </button>
                    <button
                        type="button"
                        onclick="resetForm()"
                        class="flex-1 bg-gray-200 text-gray-700 font-semibold py-3 px-6 rounded-lg hover:bg-gray-300 transition-all duration-200"
                    >
                        🔄 重新抓取
                    </button>
                    <button
                        type="button"
                        onclick="cancelForm()"
                        class="flex-1 bg-red-100 text-red-700 font-semibold py-3 px-6 rounded-lg hover:bg-red-200 transition-all duration-200"
                    >
                        ❌ 取消
                    </button>
                </div>
            </form>
        </div>

        <!-- Success Message (Hidden by default) -->
        <div id="successState" class="hidden bg-white rounded-2xl shadow-lg p-8">
            <div class="text-center">
                <div class="inline-block bg-green-100 rounded-full p-4 mb-4">
                    <svg class="w-16 h-16 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <h3 class="text-2xl font-bold text-gray-900 mb-2">🎉 成功写入Google Sheets！</h3>
                <p class="text-gray-600 mb-6">职位已添加到第 <span id="rowNumber" class="font-bold text-blue-600"></span> 行</p>
                <button
                    onclick="resetForm()"
                    class="bg-blue-600 text-white font-semibold py-3 px-8 rounded-lg hover:bg-blue-700 transition-all duration-200"
                >
                    继续抓取下一个职位
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <p class="text-gray-500 text-sm">
                    © 2025 Event Horizon Lab. All rights reserved.
                </p>
                <div class="flex items-center space-x-2 mt-4 md:mt-0">
                    <span class="text-gray-500 text-sm">Made with</span>
                    <span class="text-red-500">❤️</span>
                    <span class="text-gray-500 text-sm">for ambitious minds</span>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
